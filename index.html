<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Normal Iframe App Template</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="embed-shell" aria-label="Iframe app shell">
      <section class="app" aria-label="Native app boundary">
        <div class="screen">
          <header class="topbar place-header">
            <h1 class="text text-heading">Embedded content template</h1>
          </header>

          <main class="content">
            <img class="image place-image" src="images/Logo_EPN.svg" alt="Entry Point North">
            <p class="text text-body place-text" data-copy></p>
            <div class="row place-buttons">
              <button class="button button-primary" data-action="back" type="button">Back</button>
              <button class="button button-primary" data-action="continue" type="button">Continue</button>
            </div>
          </main>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
