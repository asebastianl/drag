<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Normal Iframe App Template</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="embed-shell" aria-label="Iframe app shell">
      <section class="app" aria-label="Native app boundary">
        <div class="screen">
          <header class="topbar grid-header">
            <h1 class="title">Embedded Content Template</h1>
          </header>

          <main class="content">
            <img class="image grid-media" src="images/Logo_EPN.svg" alt="Entry Point North">
            <p class="body-text grid-copy">
              Lorem ipsum dolor sit amet, consectetuer adipiscing elit, sed diam nonummy nibh euismod tincidunt ut laoreet dolore magna aliquam erat volutpat.
            </p>
            <div class="row grid-actions">
              <button class="button button-primary" type="button">Cancel</button>
              <button class="button button-primary" type="button">Back</button>
              <button class="button button-primary" type="button">Continue</button>
            </div>
          </main>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
